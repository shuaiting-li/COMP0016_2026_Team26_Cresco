services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cresco
      POSTGRES_PASSWORD: cresco
      POSTGRES_DB: cresco
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cresco"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
