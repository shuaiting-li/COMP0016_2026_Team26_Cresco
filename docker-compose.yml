services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cresco-backend
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/backend/data
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: cresco-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped